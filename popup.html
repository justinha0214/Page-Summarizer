<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Textbook Summarizer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f0f0f;
    --surface:   #1a1a1a;
    --surface2:  #242424;
    --border:    #2e2e2e;
    --accent:    #c8f04a;
    --accent-dim:#8aaa28;
    --text:      #f0ede6;
    --muted:     #888;
    --danger:    #ff6b6b;
    --radius:    8px;
  }

  body {
    width: 360px;
    min-height: 200px;
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
    line-height: 1.5;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--border);
  }
  .header-left { display: flex; align-items: center; gap: 8px; }
  .logo {
    width: 22px; height: 22px;
    background: var(--accent);
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: #0f0f0f;
  }
  .title { font-size: 13px; font-weight: 600; letter-spacing: 0.01em; }
  .settings-btn {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 16px; padding: 2px;
    transition: color 0.15s;
  }
  .settings-btn:hover { color: var(--text); }

  /* ── Context input ── */
  .context-wrap { padding: 12px 16px 0; }
  .label { font-size: 11px; color: var(--muted); margin-bottom: 5px; letter-spacing: 0.04em; text-transform: uppercase; }
  input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 12px;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]::placeholder { color: var(--muted); }
  input[type="text"]:focus { border-color: var(--accent-dim); }

  /* ── Action buttons ── */
  .actions { padding: 12px 16px; display: flex; gap: 8px; }
  .btn {
    flex: 1;
    padding: 9px 8px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: all 0.15s;
    background: var(--surface);
    color: var(--text);
  }
  .btn:hover { background: var(--surface2); border-color: #444; }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn.primary {
    background: var(--accent);
    color: #0f0f0f;
    border-color: var(--accent);
    font-weight: 600;
  }
  .btn.primary:hover { background: #d8ff58; border-color: #d8ff58; }
  .btn-icon { font-size: 15px; }

  /* ── Upload zone ── */
  .upload-zone {
    margin: 0 16px 12px;
    border: 1.5px dashed var(--border);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
    cursor: pointer;
    color: var(--muted);
    font-size: 12px;
    transition: all 0.15s;
    display: none;
  }
  .upload-zone.visible { display: block; }
  .upload-zone:hover { border-color: var(--accent-dim); color: var(--text); }
  .upload-zone.dragover { border-color: var(--accent); color: var(--accent); background: rgba(200,240,74,0.05); }
  .upload-icon { font-size: 22px; margin-bottom: 6px; }
  #fileInput { display: none; }

  /* ── Preview strip ── */
  .preview-strip {
    display: flex; gap: 6px; flex-wrap: wrap;
    padding: 0 16px 10px;
  }
  .preview-thumb {
    position: relative; width: 54px; height: 54px;
    border-radius: 5px; overflow: hidden;
    border: 1px solid var(--border);
  }
  .preview-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .preview-thumb .rm {
    position: absolute; top: 2px; right: 2px;
    background: rgba(0,0,0,0.7); color: #fff;
    border: none; border-radius: 50%;
    width: 16px; height: 16px; font-size: 10px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }

  /* ── Loading ── */
  .loading {
    display: none; align-items: center; gap: 10px;
    padding: 14px 16px;
    color: var(--muted); font-size: 12px;
  }
  .loading.visible { display: flex; }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Result ── */
  .result {
    display: none; padding: 0 16px 16px;
  }
  .result.visible { display: block; }

  .section { margin-bottom: 14px; }
  .section-title {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 6px;
  }
  .section-body {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    font-size: 12px;
    line-height: 1.65;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .key-points { list-style: none; }
  .key-points li {
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
    display: flex; gap: 8px; font-size: 12px; line-height: 1.55;
  }
  .key-points li:last-child { border-bottom: none; }
  .dot { color: var(--accent); flex-shrink: 0; margin-top: 1px; }

  .error-msg {
    margin: 0 16px 14px;
    padding: 9px 12px;
    background: rgba(255,107,107,0.08);
    border: 1px solid rgba(255,107,107,0.3);
    border-radius: var(--radius);
    color: var(--danger);
    font-size: 12px;
    display: none;
  }
  .error-msg.visible { display: block; }

  .result-actions { display: flex; gap: 8px; margin-top: 12px; }
  .result-actions .btn { font-size: 11px; padding: 7px 8px; }

  /* ── No key row ── */
  .no-key {
    padding: 14px 16px;
    font-size: 12px; color: var(--muted);
    text-align: center; line-height: 1.7;
  }
  .no-key a { color: var(--accent); text-decoration: none; }
  .no-key a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">S</div>
    <span class="title">Textbook Summarizer</span>
  </div>
  <button class="settings-btn" id="settingsBtn" title="Settings">⚙</button>
</div>

<div id="mainContent">
  <!-- shown when no API key is set -->
  <div class="no-key" id="noKeyMsg" style="display:none;">
    Add your Gemini API key in <a href="#" id="openSettings">settings</a> to get started. It's free — no credit card needed.
  </div>

  <div id="appContent" style="display:none;">
    <div class="context-wrap">
      <div class="label">Chapter / context (optional)</div>
      <input type="text" id="contextInput" placeholder="e.g. Chapter 5: Cell Biology" />
    </div>

    <div class="actions">
      <button class="btn primary" id="screenshotBtn">
        <span class="btn-icon">📷</span> Screenshot tab
      </button>
      <button class="btn" id="uploadBtn">
        <span class="btn-icon">🖼</span> Upload image
      </button>
    </div>

    <div class="upload-zone" id="uploadZone">
      <div class="upload-icon">📂</div>
      <div>Drop images here or <strong>click to browse</strong></div>
      <div style="margin-top:4px;font-size:11px;">PNG, JPG, WebP · multiple pages OK</div>
    </div>
    <input type="file" id="fileInput" accept="image/*" multiple />

    <div class="preview-strip" id="previewStrip"></div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <span id="loadingText">Analyzing page...</span>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="result" id="result">
      <div class="section" id="summarySection">
        <div class="section-title">Summary</div>
        <div class="section-body" id="summaryText"></div>
      </div>
      <div class="section" id="keySection">
        <div class="section-title">Key points</div>
        <ul class="key-points" id="keyList"></ul>
      </div>
      <div class="section" id="termsSection" style="display:none;">
        <div class="section-title">Terms to know</div>
        <div class="section-body" id="termsText"></div>
      </div>
      <div class="section" id="watchSection" style="display:none;">
        <div class="section-title">Watch out for</div>
        <div class="section-body" id="watchText"></div>
      </div>
      <div class="result-actions">
        <button class="btn" id="copyBtn">📋 Copy</button>
        <button class="btn" id="saveBtn">💾 Save .txt</button>
        <button class="btn" id="resetBtn">↩ New</button>
      </div>
    </div>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
